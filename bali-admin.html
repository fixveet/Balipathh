<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Balipath — Admin Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      :root {
        --green: #1a5c2a;
        --green-mid: #2a7a3a;
        --green-bright: #3dd66b;
        --green-pale: #eaf6ee;
        --dark: #0d1f12;
        --white: #fff;
        --gray: #f3f5f2;
        --gray2: #e6ece6;
        --text: #0f1a11;
        --muted: #6b7c6d;
        --border: #e2e8e2;
        --sidebar-w: 258px;
        --status-active-bg: #e6faf0;
        --status-active-fg: #1a7a3a;
        --status-draft-bg: #f0f0f5;
        --status-draft-fg: #55557a;
        --status-paused-bg: #fff7e6;
        --status-paused-fg: #a06010;
        --status-sold-bg: #fef0f0;
        --status-sold-fg: #c03030;
      }
      html,
      body {
        height: 100%;
      }
      body {
        font-family: "DM Sans", sans-serif;
        color: var(--text);
        background: var(--gray);
        display: flex;
        overflow: hidden;
      }

      /* ── SIDEBAR ── */
      .sidebar {
        width: var(--sidebar-w);
        min-width: var(--sidebar-w);
        height: 100vh;
        background: var(--white);
        border-right: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        position: fixed;
        left: 0;
        top: 0;
        bottom: 0;
        z-index: 300;
        transition: transform 0.38s cubic-bezier(0.4, 0, 0.2, 1);
      }
      .sb-logo {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 22px 20px 18px;
        border-bottom: 1px solid var(--border);
      }
      .sb-logo-icon {
        width: 40px;
        height: 40px;
        background: var(--dark);
        border-radius: 11px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }
      .sb-logo-icon svg {
        width: 21px;
        height: 21px;
        fill: var(--green-bright);
      }
      .sb-logo-text strong {
        display: block;
        font-size: 0.98rem;
        font-weight: 700;
        font-family: "Cormorant Garamond", serif;
        color: var(--text);
      }
      .sb-logo-text span {
        font-size: 0.62rem;
        font-weight: 600;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--green);
      }
      .sb-nav {
        flex: 1;
        padding: 14px 10px;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 2px;
      }
      .sb-label {
        font-size: 0.62rem;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--muted);
        padding: 14px 10px 5px;
      }
      .nav-item {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 12px;
        border-radius: 11px;
        cursor: pointer;
        font-size: 0.87rem;
        font-weight: 500;
        color: var(--muted);
        transition:
          background 0.18s,
          color 0.18s;
        text-decoration: none;
      }
      .nav-item svg {
        width: 17px;
        height: 17px;
        stroke: currentColor;
        fill: none;
        stroke-width: 1.8;
        flex-shrink: 0;
      }
      .nav-item:hover {
        background: var(--gray);
        color: var(--text);
      }
      .nav-item.active {
        background: var(--green-pale);
        color: var(--green);
        font-weight: 600;
      }
      .nav-item.active svg {
        stroke: var(--green);
      }
      .sb-user {
        padding: 14px 14px;
        border-top: 1px solid var(--border);
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .sb-avatar {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        overflow: hidden;
        flex-shrink: 0;
        background: var(--green-pale);
      }
      .sb-avatar img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      .sb-user-info {
        flex: 1;
        min-width: 0;
      }
      .sb-user-info strong {
        display: block;
        font-size: 0.85rem;
        font-weight: 600;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .sb-user-info span {
        font-size: 0.72rem;
        color: var(--muted);
      }
      .logout-btn {
        width: 28px;
        height: 28px;
        border-radius: 7px;
        background: none;
        border: none;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background 0.18s;
        flex-shrink: 0;
      }
      .logout-btn:hover {
        background: var(--gray);
      }
      .logout-btn svg {
        width: 15px;
        height: 15px;
        stroke: var(--muted);
        fill: none;
        stroke-width: 2;
      }
      .sb-overlay {
        display: none;
        position: fixed;
        inset: 0;
        z-index: 299;
        background: rgba(0, 0, 0, 0.3);
        backdrop-filter: blur(2px);
      }

      /* ── MAIN ── */
      .main {
        margin-left: var(--sidebar-w);
        flex: 1;
        display: flex;
        flex-direction: column;
        height: 100vh;
        overflow: hidden;
      }

      /* ── TOPBAR ── */
      .topbar {
        height: 66px;
        min-height: 66px;
        background: var(--white);
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 0 26px;
      }
      .topbar-menu {
        display: none;
        width: 34px;
        height: 34px;
        background: none;
        border: none;
        cursor: pointer;
        align-items: center;
        justify-content: center;
        border-radius: 8px;
        flex-shrink: 0;
      }
      .topbar-menu svg {
        width: 19px;
        height: 19px;
        stroke: var(--text);
        fill: none;
        stroke-width: 2;
      }
      .tb-search {
        flex: 1;
        max-width: 500px;
        display: flex;
        align-items: center;
        gap: 9px;
        background: var(--gray);
        border-radius: 50px;
        padding: 9px 16px;
        border: 1.5px solid transparent;
        transition:
          border-color 0.22s,
          box-shadow 0.22s;
      }
      .tb-search svg {
        width: 14px;
        height: 14px;
        stroke: var(--muted);
        fill: none;
        flex-shrink: 0;
      }
      .tb-search:focus-within {
        border-color: var(--green-bright);
        box-shadow: 0 0 0 4px rgba(61, 214, 107, 0.1);
      }
      .tb-search input {
        border: none;
        background: transparent;
        outline: none;
        font-size: 0.84rem;
        color: var(--text);
        width: 100%;
        font-family: "DM Sans", sans-serif;
      }
      .tb-search input::placeholder {
        color: var(--muted);
      }
      .tb-right {
        margin-left: auto;
        display: flex;
        align-items: center;
        gap: 9px;
      }
      .notif-btn {
        position: relative;
        width: 36px;
        height: 36px;
        border-radius: 50%;
        background: var(--gray);
        border: none;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background 0.18s;
      }
      .notif-btn:hover {
        background: var(--green-pale);
      }
      .notif-btn svg {
        width: 17px;
        height: 17px;
        stroke: var(--text);
        fill: none;
        stroke-width: 1.8;
      }
      .notif-dot {
        position: absolute;
        top: 7px;
        right: 7px;
        width: 8px;
        height: 8px;
        background: #e74c3c;
        border-radius: 50%;
        border: 2px solid var(--white);
      }
      .add-top-btn {
        display: flex;
        align-items: center;
        gap: 7px;
        background: var(--green-bright);
        color: var(--dark);
        border: none;
        border-radius: 50px;
        padding: 10px 20px;
        font-size: 0.83rem;
        font-weight: 600;
        cursor: pointer;
        font-family: "DM Sans", sans-serif;
        white-space: nowrap;
        transition:
          transform 0.22s,
          box-shadow 0.22s;
      }
      .add-top-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 7px 20px rgba(61, 214, 107, 0.38);
      }
      .add-top-btn svg {
        width: 15px;
        height: 15px;
        stroke: var(--dark);
        fill: none;
        stroke-width: 2.5;
      }

      /* ── CONTENT ── */
      .content {
        flex: 1;
        overflow-y: auto;
        padding: 24px;
        display: flex;
        flex-direction: column;
        gap: 22px;
      }

      /* ── PAGE SECTIONS ── */
      .pg {
        display: none;
        flex-direction: column;
        gap: 22px;
      }
      .pg.active {
        display: flex;
      }

      /* ── STATS ── */
      .stats-row {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 16px;
      }
      @media (max-width: 780px) {
        .stats-row {
          grid-template-columns: 1fr 1fr;
        }
      }
      @media (max-width: 480px) {
        .stats-row {
          grid-template-columns: 1fr;
        }
      }
      .stat-card {
        background: var(--white);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 20px 22px;
        animation: fadeUp 0.45s ease both;
      }
      .stat-card:nth-child(2) {
        animation-delay: 0.07s;
      }
      .stat-card:nth-child(3) {
        animation-delay: 0.14s;
      }
      .stat-top {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        margin-bottom: 16px;
      }
      .stat-icon {
        width: 42px;
        height: 42px;
        border-radius: 11px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .stat-icon svg {
        width: 21px;
        height: 21px;
        stroke-width: 1.8;
        fill: none;
      }
      .stat-icon.green {
        background: var(--green-pale);
      }
      .stat-icon.green svg {
        stroke: var(--green);
      }
      .stat-icon.blue {
        background: #e8f0ff;
      }
      .stat-icon.blue svg {
        stroke: #3a60d0;
      }
      .stat-icon.amber {
        background: #fff3e0;
      }
      .stat-icon.amber svg {
        stroke: #c07820;
      }
      .stat-icon.rose {
        background: #fdeef0;
      }
      .stat-icon.rose svg {
        stroke: #c03060;
      }
      .stat-badge {
        font-size: 0.73rem;
        font-weight: 700;
        padding: 3px 9px;
        border-radius: 50px;
      }
      .stat-badge.up {
        background: #e6faf0;
        color: #1a7a3a;
      }
      .stat-badge.dn {
        background: #fef0f0;
        color: #c03030;
      }
      .stat-lbl {
        font-size: 0.8rem;
        color: var(--muted);
        margin-bottom: 5px;
      }
      .stat-val {
        font-size: 1.9rem;
        font-weight: 700;
        font-family: "Cormorant Garamond", serif;
        line-height: 1;
      }

      /* ── TABLE CARD ── */
      .tbl-card {
        background: var(--white);
        border: 1px solid var(--border);
        border-radius: 16px;
        overflow: hidden;
        animation: fadeUp 0.45s ease 0.18s both;
      }
      .tbl-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 18px 22px;
        border-bottom: 1px solid var(--border);
        flex-wrap: wrap;
        gap: 10px;
      }
      .tbl-head h2 {
        font-size: 1.08rem;
        font-weight: 700;
        font-family: "Cormorant Garamond", serif;
      }
      .tbl-actions {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
      }
      .tbl-search {
        display: flex;
        align-items: center;
        gap: 7px;
        background: var(--gray);
        border-radius: 50px;
        padding: 7px 14px;
        border: 1.5px solid transparent;
        transition: border-color 0.2s;
      }
      .tbl-search svg {
        width: 12px;
        height: 12px;
        stroke: var(--muted);
        fill: none;
        flex-shrink: 0;
      }
      .tbl-search:focus-within {
        border-color: var(--green-bright);
      }
      .tbl-search input {
        border: none;
        background: transparent;
        outline: none;
        font-size: 0.81rem;
        color: var(--text);
        width: 150px;
        font-family: "DM Sans", sans-serif;
      }
      .tbl-search input::placeholder {
        color: var(--muted);
      }
      .icon-btn {
        display: flex;
        align-items: center;
        gap: 6px;
        background: var(--white);
        border: 1.5px solid var(--border);
        border-radius: 50px;
        padding: 7px 16px;
        font-size: 0.8rem;
        font-weight: 500;
        cursor: pointer;
        font-family: "DM Sans", sans-serif;
        color: var(--text);
        white-space: nowrap;
        transition:
          border-color 0.2s,
          background 0.2s;
      }
      .icon-btn svg {
        width: 13px;
        height: 13px;
        stroke: var(--text);
        fill: none;
      }
      .icon-btn:hover {
        border-color: var(--green-bright);
        background: var(--green-pale);
      }
      .tbl-wrap {
        overflow-x: auto;
      }
      table {
        width: 100%;
        border-collapse: collapse;
      }
      thead th {
        font-size: 0.68rem;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--muted);
        padding: 12px 18px;
        text-align: left;
        border-bottom: 1px solid var(--border);
        white-space: nowrap;
      }
      tbody tr {
        border-bottom: 1px solid var(--border);
        transition: background 0.15s;
      }
      tbody tr:last-child {
        border-bottom: none;
      }
      tbody tr:hover {
        background: #fafcfa;
      }
      td {
        padding: 14px 18px;
        font-size: 0.85rem;
        vertical-align: middle;
      }
      .pkg-cell {
        display: flex;
        align-items: center;
        gap: 11px;
      }
      .pkg-thumb {
        width: 44px;
        height: 44px;
        border-radius: 9px;
        overflow: hidden;
        flex-shrink: 0;
        background: var(--green-pale);
      }
      .pkg-thumb img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      .pkg-info strong {
        display: block;
        font-size: 0.88rem;
        font-weight: 600;
        margin-bottom: 2px;
      }
      .pkg-info span {
        font-size: 0.74rem;
        color: var(--muted);
      }
      .loc-cell {
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .loc-dot {
        width: 7px;
        height: 7px;
        background: var(--green-bright);
        border-radius: 50%;
        flex-shrink: 0;
      }
      .price-cell strong {
        display: block;
        font-size: 0.92rem;
        font-weight: 700;
        font-family: "Cormorant Garamond", serif;
      }
      .price-cell span {
        font-size: 0.7rem;
        color: var(--muted);
      }
      .status-badge {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        font-size: 0.73rem;
        font-weight: 600;
        padding: 4px 11px;
        border-radius: 50px;
      }
      .status-badge::before {
        content: "";
        width: 5px;
        height: 5px;
        border-radius: 50%;
        background: currentColor;
        opacity: 0.75;
        flex-shrink: 0;
      }
      .status-badge.active {
        background: var(--status-active-bg);
        color: var(--status-active-fg);
      }
      .status-badge.draft {
        background: var(--status-draft-bg);
        color: var(--status-draft-fg);
      }
      .status-badge.paused {
        background: var(--status-paused-bg);
        color: var(--status-paused-fg);
      }
      .status-badge.sold {
        background: var(--status-sold-bg);
        color: var(--status-sold-fg);
      }
      .act-btns {
        display: flex;
        align-items: center;
        gap: 5px;
      }
      .act-btn {
        width: 30px;
        height: 30px;
        border-radius: 7px;
        border: none;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition:
          background 0.18s,
          transform 0.18s;
      }
      .act-btn svg {
        width: 13px;
        height: 13px;
        stroke: currentColor;
        fill: none;
        stroke-width: 2;
      }
      .act-btn.edit {
        background: var(--gray);
        color: var(--text);
      }
      .act-btn.edit:hover {
        background: var(--green-pale);
        color: var(--green);
        transform: scale(1.1);
      }
      .act-btn.del {
        background: var(--gray);
        color: var(--text);
      }
      .act-btn.del:hover {
        background: #fef0f0;
        color: #c0302a;
        transform: scale(1.1);
      }
      .empty-state td {
        text-align: center;
        padding: 50px 20px;
        color: var(--muted);
      }
      .empty-state svg {
        width: 38px;
        height: 38px;
        stroke: var(--muted);
        fill: none;
        opacity: 0.4;
        display: block;
        margin: 0 auto 12px;
      }
      .tbl-footer {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 12px 22px;
        border-top: 1px solid var(--border);
        flex-wrap: wrap;
        gap: 8px;
      }
      .tbl-footer p {
        font-size: 0.8rem;
        color: var(--muted);
      }
      .pag {
        display: flex;
        align-items: center;
        gap: 4px;
      }
      .pag-btn {
        width: 30px;
        height: 30px;
        border-radius: 7px;
        border: none;
        background: var(--gray);
        color: var(--text);
        font-size: 0.82rem;
        font-weight: 500;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition:
          background 0.18s,
          color 0.18s;
      }
      .pag-btn svg {
        width: 13px;
        height: 13px;
        stroke: currentColor;
        fill: none;
        stroke-width: 2;
      }
      .pag-btn:hover {
        background: var(--green-pale);
        color: var(--green);
      }
      .pag-btn.active {
        background: var(--green-bright);
        color: var(--dark);
        font-weight: 700;
      }
      .pag-btn:disabled {
        opacity: 0.3;
        cursor: not-allowed;
      }

      /* ── MODAL ── */
      .modal-ov {
        position: fixed;
        inset: 0;
        z-index: 800;
        background: rgba(13, 31, 18, 0.45);
        backdrop-filter: blur(4px);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.25s;
      }
      .modal-ov.open {
        opacity: 1;
        pointer-events: all;
      }
      .modal {
        background: var(--white);
        border-radius: 20px;
        width: 100%;
        max-width: 560px;
        max-height: 90vh;
        overflow-y: auto;
        transform: translateY(18px) scale(0.97);
        transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        box-shadow: 0 20px 70px rgba(0, 0, 0, 0.18);
      }
      .modal-ov.open .modal {
        transform: translateY(0) scale(1);
      }
      .modal-hd {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 20px 24px;
        border-bottom: 1px solid var(--border);
        position: sticky;
        top: 0;
        background: var(--white);
        z-index: 1;
      }
      .modal-hd h3 {
        font-size: 1.1rem;
        font-weight: 700;
        font-family: "Cormorant Garamond", serif;
      }
      .modal-close {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        background: var(--gray);
        border: none;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition:
          background 0.18s,
          transform 0.25s;
      }
      .modal-close:hover {
        background: #f0e0e0;
        transform: rotate(90deg);
      }
      .modal-close svg {
        width: 14px;
        height: 14px;
        stroke: var(--text);
        fill: none;
        stroke-width: 2.2;
      }
      .modal-body {
        padding: 22px 24px;
        display: flex;
        flex-direction: column;
        gap: 16px;
      }
      .form-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 14px;
      }
      @media (max-width: 500px) {
        .form-row {
          grid-template-columns: 1fr;
        }
      }
      .fgroup {
        display: flex;
        flex-direction: column;
        gap: 5px;
      }
      .fgroup label {
        font-size: 0.75rem;
        font-weight: 600;
        color: var(--text);
        letter-spacing: 0.04em;
      }
      .fgroup label .req {
        color: #c03030;
        margin-left: 2px;
      }
      .fgroup input,
      .fgroup select,
      .fgroup textarea {
        border: 1.5px solid var(--border);
        border-radius: 9px;
        padding: 9px 13px;
        font-size: 0.85rem;
        font-family: "DM Sans", sans-serif;
        color: var(--text);
        outline: none;
        background: var(--white);
        transition:
          border-color 0.2s,
          box-shadow 0.2s;
      }
      .fgroup input:focus,
      .fgroup select:focus,
      .fgroup textarea:focus {
        border-color: var(--green-bright);
        box-shadow: 0 0 0 4px rgba(61, 214, 107, 0.1);
      }
      .fgroup textarea {
        resize: vertical;
        min-height: 72px;
      }
      .pfx {
        position: relative;
      }
      .pfx .pfx-sym {
        position: absolute;
        left: 12px;
        top: 50%;
        transform: translateY(-50%);
        color: var(--muted);
        font-size: 0.85rem;
        pointer-events: none;
      }
      .pfx input {
        padding-left: 24px;
      }
      .img-drop {
        height: 110px;
        border-radius: 9px;
        overflow: hidden;
        background: var(--gray);
        border: 1.5px dashed var(--border);
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        position: relative;
        transition: border-color 0.2s;
      }
      .img-drop:hover {
        border-color: var(--green-bright);
      }
      .img-drop img {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      .img-ph {
        text-align: center;
        color: var(--muted);
        font-size: 0.76rem;
        pointer-events: none;
      }
      .img-ph svg {
        width: 24px;
        height: 24px;
        stroke: var(--muted);
        fill: none;
        display: block;
        margin: 0 auto 5px;
        opacity: 0.6;
      }
      .modal-ft {
        padding: 14px 24px 20px;
        display: flex;
        justify-content: flex-end;
        gap: 9px;
        border-top: 1px solid var(--border);
      }
      .btn-cancel {
        padding: 10px 22px;
        border-radius: 50px;
        background: var(--gray);
        border: none;
        cursor: pointer;
        font-size: 0.84rem;
        font-weight: 500;
        color: var(--text);
        font-family: "DM Sans", sans-serif;
        transition: background 0.18s;
      }
      .btn-cancel:hover {
        background: var(--gray2);
      }
      .btn-save {
        padding: 10px 26px;
        border-radius: 50px;
        background: var(--green-bright);
        border: none;
        cursor: pointer;
        font-size: 0.84rem;
        font-weight: 600;
        color: var(--dark);
        font-family: "DM Sans", sans-serif;
        transition:
          transform 0.22s,
          box-shadow 0.22s;
      }
      .btn-save:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 18px rgba(61, 214, 107, 0.38);
      }

      /* ── DELETE MODAL ── */
      .del-modal {
        max-width: 380px;
        padding: 30px 26px;
        text-align: center;
      }
      .del-icon {
        width: 52px;
        height: 52px;
        border-radius: 50%;
        background: #fef0f0;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 14px;
      }
      .del-icon svg {
        width: 24px;
        height: 24px;
        stroke: #c0302a;
        fill: none;
        stroke-width: 2;
      }
      .del-modal h3 {
        font-size: 1.1rem;
        font-weight: 700;
        margin-bottom: 8px;
        font-family: "Cormorant Garamond", serif;
      }
      .del-modal p {
        font-size: 0.85rem;
        color: var(--muted);
        line-height: 1.65;
        margin-bottom: 22px;
      }
      .del-modal .del-btns {
        display: flex;
        gap: 9px;
        justify-content: center;
      }
      .btn-del {
        padding: 10px 26px;
        border-radius: 50px;
        background: #c0302a;
        border: none;
        cursor: pointer;
        font-size: 0.84rem;
        font-weight: 600;
        color: var(--white);
        font-family: "DM Sans", sans-serif;
        transition:
          transform 0.22s,
          box-shadow 0.22s;
      }
      .btn-del:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 18px rgba(192, 48, 42, 0.38);
      }

      /* ── TOAST ── */
      .toast {
        position: fixed;
        bottom: 24px;
        left: 50%;
        transform: translateX(-50%) translateY(80px);
        background: var(--dark);
        color: var(--white);
        padding: 11px 26px;
        border-radius: 50px;
        font-size: 0.84rem;
        font-weight: 500;
        box-shadow: 0 8px 30px rgba(0, 0, 0, 0.18);
        z-index: 2000;
        white-space: nowrap;
        border: 1px solid rgba(255, 255, 255, 0.08);
        transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      }
      .toast.show {
        transform: translateX(-50%) translateY(0);
      }
      .toast.ok {
        border-left: 3px solid var(--green-bright);
      }
      .toast.err {
        border-left: 3px solid #e74c3c;
      }

      /* ── ANIMATIONS ── */
      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(18px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* ── RESPONSIVE ── */
      @media (max-width: 880px) {
        .sidebar {
          transform: translateX(calc(-1 * var(--sidebar-w)));
        }
        .sidebar.open {
          transform: translateX(0);
        }
        .sb-overlay.open {
          display: block;
        }
        .main {
          margin-left: 0;
        }
        .topbar-menu {
          display: flex;
        }
        .tb-search {
          max-width: 260px;
        }
        .add-top-btn span {
          display: none;
        }
        .add-top-btn {
          padding: 9px 12px;
          border-radius: 50%;
        }
        .view-site-label {
          display: none;
        }
        .content {
          padding: 16px;
        }
      }
      @media (max-width: 580px) {
        .topbar {
          padding: 0 14px;
          gap: 9px;
        }
        .tb-search {
          display: none;
        }
        .stats-row {
          grid-template-columns: 1fr 1fr;
        }
        thead th:nth-child(3),
        td:nth-child(3) {
          display: none;
        }
      }
      @media (max-width: 380px) {
        .stats-row {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>

      /* ════════════════════════════════════════
   LOCALSTORAGE HELPERS
════════════════════════════════════════ */
      function lsGet(key, defaults) {
        try {
          const raw = localStorage.getItem(key);
          return raw ? JSON.parse(raw) : JSON.parse(JSON.stringify(defaults));
        } catch (e) {
          return JSON.parse(JSON.stringify(defaults));
        }
      }
      function lsSave(key, data) {
        try {
          localStorage.setItem(key, JSON.stringify(data));
        } catch (e) {}
      }
      function initStore(sec) {
        const cfg = SECTIONS[sec];
        if (!localStorage.getItem(cfg.storageKey)) {
          lsSave(cfg.storageKey, JSON.parse(JSON.stringify(cfg.defaults)));
        }
      }
      function getItems(sec) {
        return lsGet(SECTIONS[sec].storageKey, SECTIONS[sec].defaults);
      }
      function saveItems(sec, data) {
        lsSave(SECTIONS[sec].storageKey, data);
      }

      // Init all stores
      ["packages", "rentals", "souvenirs"].forEach(initStore);

════════════════════════════════════════ */

        document.getElementById("sbOverlay").classList.toggle("open", sbOpen);
        document.body.style.overflow = sbOpen ? "hidden" : "";
      }
      function closeSb() {
        sbOpen = false;
        document.getElementById("sidebar").classList.remove("open");
        document.getElementById("sbOverlay").classList.remove("open");
        document.body.style.overflow = "";
      }

      function showPg(pg, el) {
        activePg = pg;
        document.querySelectorAll(".pg").forEach((s) => s.classList.remove("active"));
        document.querySelectorAll(".nav-item").forEach((n) => n.classList.remove("active"));
        document.getElementById("pg-" + pg).classList.add("active");
        el.classList.add("active");
        closeSb();
        // Set add-button label & active section
        if (["packages", "rentals", "souvenirs"].includes(pg)) {
          activeSec = pg;
          document.getElementById("addTopLabel").textContent = "Add New " + SECTIONS[pg].label;
          renderPg(pg);
        } else {
          document.getElementById("addTopLabel").textContent = "Add New Package";
        }
        if (pg === "dashboard") renderDashboard();
      }

      /* ════════════════════════════════════════
   TABLE BUILDER
════════════════════════════════════════ */
      function buildTable(sec, allItems, containerId) {
        const cfg = SECTIONS[sec];
        const q = searches[sec] || "";
        const fil = q ? allItems.filter((i) => (i.name + " " + (i.location || i.category || "") + " " + i.status).toLowerCase().includes(q.toLowerCase())) : allItems;
        const pg = pages[sec] || 1;
        const tot = Math.ceil(fil.length / PAGE_SZ);
        const slice = fil.slice((pg - 1) * PAGE_SZ, pg * PAGE_SZ);

        // subtitle field
        const subField = sec === "packages" ? "duration" : sec === "rentals" ? "tipe" : sec === "souvenirs" ? "category" : null;

        const rows =
          slice.length === 0
            ? `<tr class="empty-state"><td colspan="5"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>No items found.</td></tr>`
            : slice
                .map((it) => {
                  const subtitle = subField === "bedrooms" ? (it.bedrooms ? it.bedrooms + " Bedrooms" : "—") : subField === "category" ? it.category || "—" : it[subField] || "—";
                  return `<tr>
        <td><div class="pkg-cell">
          <div class="pkg-thumb"><img src="${it.img || ""}" alt="${it.name}" onerror="this.style.display='none'"/></div>
          <div class="pkg-info"><strong>${sec === "packages" ? `<a href="bali-detail.html?id=${it.id}" target="_blank" style="color:inherit;text-decoration:none;" onmouseover="this.style.color='var(--green)'" onmouseout="this.style.color='inherit'">${it.name}</a>` : it.name}</strong><span>${subtitle}</span></div>
        </div></td>
        <td><div class="loc-cell"><span class="loc-dot"></span>${it.location || it.origin || "—"}</div></td>
        <td><div class="price-cell"><strong>$${Number(it.price).toLocaleString()}</strong><span>${cfg.priceLabel}</span></div></td>
        <td><span class="status-badge ${it.status}">${cap(it.status)}</span></td>
        <td><div class="act-btns">
          ${sec === "packages" ? `<a class="act-btn" href="bali-detail.html?id=${it.id}" title="View" target="_blank" style="background:var(--gray);color:var(--text);display:flex;align-items:center;justify-content:center;width:30px;height:30px;border-radius:7px;text-decoration:none;transition:background .18s,transform .18s;" onmouseover="this.style.background='var(--green-pale)';this.style.transform='scale(1.1)';" onmouseout="this.style.background='var(--gray)';this.style.transform='scale(1)';"><svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></a>` : ""}
          <button class="act-btn edit" onclick="openEdit('${sec}',${it.id})" title="Edit"><svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>
          <button class="act-btn del" onclick="openDel('${sec}',${it.id})" title="Delete"><svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6"/></svg></button>
        </div></td>
      </tr>`;
                })
                .join("");

        // Pagination buttons
        let pagBtns = `<button class="pag-btn" onclick="goPage('${sec}','${containerId}',${pg - 1})" ${pg <= 1 ? "disabled" : ""}><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg></button>`;
        for (let i = 1; i <= Math.max(tot, 1); i++) pagBtns += `<button class="pag-btn ${i === pg ? "active" : ""}" onclick="goPage('${sec}','${containerId}',${i})">${i}</button>`;
        pagBtns += `<button class="pag-btn" onclick="goPage('${sec}','${containerId}',${pg + 1})" ${pg >= tot || tot === 0 ? "disabled" : ""}><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></button>`;

        const start = (pg - 1) * PAGE_SZ + 1,
          end = Math.min(pg * PAGE_SZ, fil.length);

        return `<div class="tbl-card">
    <div class="tbl-head">
      <h2>Manage ${cfg.plural}</h2>
      <div class="tbl-actions">
        <label class="tbl-search">
          <svg viewBox="0 0 24 24" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" placeholder="Search…" value="${q}" oninput="tblSearch('${sec}','${containerId}',this.value)"/>
        </label>
        <button class="icon-btn" onclick="doExport('${sec}')">
          <svg viewBox="0 0 24 24" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Export CSV
        </button>
        <button class="icon-btn" onclick="openAdd('${sec}')">
          <svg viewBox="0 0 24 24" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Add
        </button>
      </div>
    </div>
    <div class="tbl-wrap"><table>
      <thead><tr><th>Detail</th><th>Location / Origin</th><th>Price</th><th>Status</th><th>Actions</th></tr></thead>
      <tbody>${rows}</tbody>
    </table></div>
    <div class="tbl-footer">
      <p>Showing ${fil.length ? start : 0}–${end} of ${fil.length} entries</p>
      <div class="pag">${pagBtns}</div>
    </div>
  </div>`;
      }

      function goPage(sec, cid, p) {
        const items = getItems(sec);
        const q = searches[sec] || "";
        const fil = q ? items.filter((i) => (i.name + " " + (i.location || i.category || "") + " " + i.status).toLowerCase().includes(q.toLowerCase())) : items;
        const tot = Math.max(1, Math.ceil(fil.length / PAGE_SZ));
        pages[sec] = Math.max(1, Math.min(p, tot));
        rerenderTable(sec, cid);
      }

      function tblSearch(sec, cid, q) {
        searches[sec] = q;
        pages[sec] = 1;
        rerenderTable(sec, cid);
      }

      function rerenderTable(sec, cid) {
        const items = getItems(sec);
        const el = document.getElementById(cid);
        if (el) el.innerHTML = buildTable(sec, items, cid);
      }

      function handleTopSearch() {
        const q = document.getElementById("topSearch").value;
        searches[activeSec] = q;
        pages[activeSec] = 1;
        if (activePg === "dashboard") {
          searches.packages = q;
          renderDashboard();
        } else renderPg(activeSec);
      }

      /* ════════════════════════════════════════
   MODAL FORM
════════════════════════════════════════ */
      function buildForm(sec, item) {
        const cfg = SECTIONS[sec];
        let html = "";

        // Image row
        const imgUrl = item?.img || "";
        html += `<div class="fgroup">
    <label>Image URL</label>
    <div class="img-drop" onclick="promptImg()">
      <img id="fImgPrev" src="${imgUrl}" style="${imgUrl ? "" : "display:none"}" alt=""/>
      <div class="img-ph" id="fImgPh" style="${imgUrl ? "display:none" : ""}">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        Click to paste image URL
      </div>
    </div>
    <input type="text" id="fImg" placeholder="https://images.unsplash.com/…" value="${imgUrl}" oninput="prevImg(this.value)" style="margin-top:7px"/>
  </div>`;

        // Pair fields into rows
        const fullFields = cfg.fields.filter((f) => f.col === "full");
        const pairedFields = cfg.fields.filter((f) => f.col !== "full");
        const pairs = [];
        for (let i = 0; i < pairedFields.length; i += 2) pairs.push(pairedFields.slice(i, i + 2));

        pairs.forEach((pair) => {
          html += `<div class="form-row">`;
          pair.forEach((f) => (html += buildField(f, item)));
          if (pair.length === 1) html += `<div></div>`;
          html += `</div>`;
        });
        fullFields.forEach((f) => (html += buildField(f, item)));

        return html;
      }

      function buildField(f, item) {
        const val = item?.[f.id] ?? "";
        if (f.type === "select") {
          const sec = activeSec;
          const opts = SECTIONS[sec].statusOptions.map((s) => `<option value="${s}" ${val === s || (!val && s === "active") ? "selected" : ""}>${cap(s)}</option>`).join("");
          return `<div class="fgroup"><label>${f.label}</label><select id="f_${f.id}">${opts}</select></div>`;
        }
        if (f.type === "textarea") {
          return `<div class="fgroup"><label>${f.label}${f.req ? '<span class="req">*</span>' : ""}</label><textarea id="f_${f.id}" placeholder="${f.placeholder}">${val}</textarea></div>`;
        }
        const inner = `<input type="${f.type}" id="f_${f.id}" placeholder="${f.placeholder}" value="${val}"/>`;
        const wrapped = f.prefix ? `<div class="pfx"><span class="pfx-sym">${f.prefix}</span>${inner}</div>` : inner;
        return `<div class="fgroup"><label>${f.label}${f.req ? '<span class="req">*</span>' : ""}</label>${wrapped}</div>`;
      }

      function openAdd(sec) {
        if (sec && typeof sec === "string") activeSec = sec;
        editId = null;
        document.getElementById("modalTitle").textContent = "Add New " + SECTIONS[activeSec].label;
        document.getElementById("modalBody").innerHTML = buildForm(activeSec, null);
        document.getElementById("formOv").classList.add("open");
        document.body.style.overflow = "hidden";
      }

      function openEdit(sec, id) {
        activeSec = sec;
        editId = id;
        const item = getItems(sec).find((i) => i.id === id);
        if (!item) return;
        document.getElementById("modalTitle").textContent = "Edit " + SECTIONS[sec].label;
        document.getElementById("modalBody").innerHTML = buildForm(sec, item);
        document.getElementById("formOv").classList.add("open");
        document.body.style.overflow = "hidden";
      }

      function closeForm() {
        document.getElementById("formOv").classList.remove("open");
        document.body.style.overflow = "";
      }

      function promptImg() {
        const cur = document.getElementById("fImg")?.value || "";
        const url = prompt("Paste an image URL:", cur);
        if (url !== null) {
          document.getElementById("fImg").value = url;
          prevImg(url);
        }
      }

      function prevImg(url) {
        const img = document.getElementById("fImgPrev");
        const ph = document.getElementById("fImgPh");
        if (!img || !ph) return;
        if (url && url.startsWith("http")) {
          img.src = url;
          img.style.display = "block";
          ph.style.display = "none";
        } else {
          img.style.display = "none";
          ph.style.display = "block";
        }
      }

      function saveItem() {
        const cfg = SECTIONS[activeSec];
        const reqFields = cfg.fields.filter((f) => f.req);
        for (const f of reqFields) {
          const el = document.getElementById("f_" + f.id);
          if (!el || !el.value.trim()) {
            toast(`"${f.label}" is required ⚠️`, "err");
            return;
          }
        }
        if (document.getElementById("f_price") && (isNaN(parseFloat(document.getElementById("f_price").value)) || parseFloat(document.getElementById("f_price").value) <= 0)) {
          toast("Enter a valid price ⚠️", "err");
          return;
        }

        const data = { img: document.getElementById("fImg")?.value?.trim() || "" };
        cfg.fields.forEach((f) => {
          const el = document.getElementById("f_" + f.id);
          if (!el) return;
          data[f.id] = f.type === "number" ? parseFloat(el.value) || 0 : el.value.trim();
        });

        let items = getItems(activeSec);
        if (editId) {
          items = items.map((i) => (i.id === editId ? { ...i, ...data } : i));
          toast(`"${data.name}" updated ✅`, "ok");
        } else {
          const newId = items.reduce((mx, i) => Math.max(mx, i.id), 0) + 1;
          items.push({ id: newId, ...data });
          toast(`"${data.name}" added 🌴`, "ok");
        }
        saveItems(activeSec, items);
        closeForm();
        refreshAll();
      }

      /* ════════════════════════════════════════
   DELETE
════════════════════════════════════════ */
      function openDel(sec, id) {
        delSec = sec;
        delId = id;
        const item = getItems(sec).find((i) => i.id === id);
        document.getElementById("delMsg").textContent = `"${item?.name}" will be permanently deleted.`;
        document.getElementById("delOv").classList.add("open");
        document.body.style.overflow = "hidden";
      }
      function closeDel() {
        document.getElementById("delOv").classList.remove("open");
        document.body.style.overflow = "";
        delId = null;
        delSec = null;
      }
      function confirmDel() {
        const items = getItems(delSec).filter((i) => i.id !== delId);
        const pg = pages[delSec];
        const tot = Math.max(1, Math.ceil(items.length / PAGE_SZ));
        if (pg > tot) pages[delSec] = tot;
        saveItems(delSec, items);
        closeDel();
        toast("Item deleted", "ok");
        refreshAll();
      }

      /* ════════════════════════════════════════
   EXPORT CSV
════════════════════════════════════════ */
      function doExport(sec) {
        const items = getItems(sec);
        const headers = Object.keys(items[0] || {}).join(",");
        const rows = items.map((i) =>
          Object.values(i)
            .map((v) => `"${v}"`)
            .join(","),
        );
        const csv = [headers, ...rows].join("\n");
        const a = document.createElement("a");
        a.href = URL.createObjectURL(new Blob([csv], { type: "text/csv" }));
        a.download = `bali-${sec}.csv`;
        a.click();
        toast("CSV exported 📥", "ok");
      }

      /* ════════════════════════════════════════
   REFRESH
════════════════════════════════════════ */
      function refreshAll() {
        if (activePg === "dashboard") renderDashboard();
        else renderPg(activeSec);
      }

      /* ════════════════════════════════════════
   UTILS
════════════════════════════════════════ */
      function cap(s) {
        return s.charAt(0).toUpperCase() + s.slice(1);
      }
      function handleOvClick(e, id) {
        if (e.target === document.getElementById(id)) {
          id === "formOv" ? closeForm() : closeDel();
        }
      }

      let _tt;
      function toast(msg, type = "") {
        const el = document.getElementById("toastEl");
        el.textContent = msg;
        el.className = "toast " + (type === "ok" ? "ok" : type === "err" ? "err" : "") + " show";
        clearTimeout(_tt);
        _tt = setTimeout(() => el.classList.remove("show"), 3400);
      }

      /* ════════════════════════════════════════
   INIT
════════════════════════════════════════ */
      renderDashboard();
    </script>
  </body>
</html>
